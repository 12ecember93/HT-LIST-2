<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GitHub IPTV - Netflix Style</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        :root { 
            --primary-color: #e50914; /* Màu đỏ Netflix */
            --bg-dark: #141414; 
            --card-bg: #2f2f2f;
            --text-main: #ffffff;
        }
        
        body { 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            background: var(--bg-dark); 
            color: var(--text-main); 
            margin: 0; 
            overflow-x: hidden;
        }
        
        /* Player cố định phía trên */
        .video-wrapper { 
            position: sticky; 
            top: 0; 
            z-index: 1000; 
            background: #000; 
            width: 100%; 
            max-width: 1000px; 
            margin: 0 auto; 
        }
        video { width: 100%; aspect-ratio: 16/9; display: block; }
        
        .controls { padding: 10px; background: #141414; }
        .btn-fullscreen { 
            width: 100%; 
            padding: 15px; 
            font-size: 16px; 
            font-weight: bold;
            background: var(--primary-color); 
            color: white; 
            border: none; 
            border-radius: 4px; 
            cursor: pointer;
        }

        .container { padding: 10px 0 20px 15px; }
        
        .group-header { 
            font-size: 18px; 
            font-weight: bold; 
            margin: 20px 0 10px 0;
            color: #e5e5e5;
        }
        
        /* Netflix Scroll Row */
        .scroll-row { 
            display: flex; 
            overflow-x: auto; 
            gap: 12px; 
            padding-bottom: 15px;
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
        }
        
        /* Ẩn thanh cuộn nhưng vẫn cuộn được */
        .scroll-row::-webkit-scrollbar { display: none; }
        .scroll-row { -ms-overflow-style: none; scrollbar-width: none; }

        /* Thẻ kênh kiểu Poster */
        .channel-card { 
            flex: 0 0 140px; /* Độ rộng cố định cho mỗi item */
            background: var(--card-bg); 
            height: 80px; 
            border-radius: 4px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            text-align: center;
            padding: 10px;
            font-size: 15px; 
            font-weight: bold; 
            cursor: pointer;
            transition: transform 0.3s;
            border: 2px solid transparent;
            box-sizing: border-box;
        }
        
        .channel-card:active { transform: scale(0.9); }
        
        .channel-card.active { 
            border-color: var(--primary-color); 
            background: #404040;
        }

        /* Chữ cho kênh */
        .channel-name {
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
    </style>
</head>
<body>

<div class="video-wrapper">
    <video id="video" autoplay playsinline></video>
    <div class="controls">
        <button class="btn-fullscreen" onclick="goFullScreen()">PHÓNG TO MÀN HÌNH</button>
    </div>
</div>

<div class="container">
    <div class="group-header">Nguồn FPT</div>
    <div class="scroll-row" id="group-fpt"></div>

    <div class="group-header">Nguồn Dự Phòng</div>
    <div class="scroll-row" id="group-hd"></div>
</div>

<script>
    const channels = [
        { name: "VTV1 FPT", url: "https://live.fptplay53.net/fnxch2/vtv1hd_abr.smil/chunklist.m3u8", group: "fpt" },
        { name: "VTV2 FPT", url: "https://live.fptplay53.net/fnxch2/vtv2hd_abr.smil/chunklist.m3u8", group: "fpt" },
        { name: "VTV3 FPT", url: "https://live.fptplay53.net/fnxch2/vtv3hd_abr.smil/chunklist.m3u8", group: "fpt" },
        { name: "VTV4 FPT", url: "https://live.fptplay53.net/fnxch2/vtv4hd_abr.smil/chunklist.m3u8", group: "fpt" },
        { name: "VTV5 FPT", url: "https://live-a.fptplay53.net/live/media/VTV5HD/live_hls_avc/index.m3u8", group: "fpt" },
        { name: "THVL1 FPT", url: "https://live.fptplay53.net/epzch2/vinhlong1_abr.smil/chunklist_b4200000.m3u8", group: "fpt" },
        
        { name: "VTV1 HD", url: "https://toiyeuvietnam.dpdns.org/TuyetDoiKhongKinhDoanh/vtv1-hd/KenhCoBan.m3u8", group: "hd" },
        { name: "VTV2 HD", url: "https://toiyeuvietnam.dpdns.org/TuyetDoiKhongKinhDoanh/vtv2-hd/KenhCoBan.m3u8", group: "hd" },
        { name: "VTV3 HD", url: "https://toiyeuvietnam.dpdns.org/TuyetDoiKhongKinhDoanh/vtv3-hd/KenhCoBan.m3u8", group: "hd" },
        { name: "VTV4 HD", url: "https://toiyeuvietnam.dpdns.org/TuyetDoiKhongKinhDoanh/vtv4-hd/KenhCoBan.m3u8", group: "hd" },
        { name: "VTV5 HD", url: "https://toiyeuvietnam.dpdns.org/TuyetDoiKhongKinhDoanh/vtv5-hd/KenhCoBan.m3u8", group: "hd" },
        { name: "VTV7 HD", url: "https://toiyeuvietnam.dpdns.org/TuyetDoiKhongKinhDoanh/vtv7-hd/KenhCoBan.m3u8", group: "hd" },
        { name: "VTV8 HD", url: "https://toiyeuvietnam.dpdns.org/TuyetDoiKhongKinhDoanh/vtv8-hd/KenhCoBan.m3u8", group: "hd" },
        { name: "VTV9 HD", url: "https://toiyeuvietnam.dpdns.org/TuyetDoiKhongKinhDoanh/vtv9-hd/KenhCoBan.m3u8", group: "hd" },
        { name: "VTV 10", url: "https://toiyeuvietnam.dpdns.org/TuyetDoiKhongKinhDoanh/vtv10/KenhCoBan.m3u8", group: "hd" },
        { name: "HTV1", url: "https://toiyeuvietnam.dpdns.org/TuyetDoiKhongKinhDoanh/htv1/KenhCoBan.m3u8", group: "hd" },
        { name: "HTV2", url: "https://toiyeuvietnam.dpdns.org/TuyetDoiKhongKinhDoanh/htv2/KenhCoBan.m3u8", group: "hd" },
        { name: "HTV3", url: "https://toiyeuvietnam.dpdns.org/TuyetDoiKhongKinhDoanh/htv3/KenhCoBan.m3u8", group: "hd" },
        { name: "HTV4", url: "https://toiyeuvietnam.dpdns.org/TuyetDoiKhongKinhDoanh/htv4/KenhCoBan.m3u8", group: "hd" },
        { name: "HTV7 HD", url: "https://toiyeuvietnam.dpdns.org/TuyetDoiKhongKinhDoanh/htv7-hd/KenhCoBan.m3u8", group: "hd" },
        { name: "HTV9 HD", url: "https://toiyeuvietnam.dpdns.org/TuyetDoiKhongKinhDoanh/htv9-hd/KenhCoBan.m3u8", group: "hd" },
        { name: "THVL1", url: "https://toiyeuvietnam.dpdns.org/TuyetDoiKhongKinhDoanh/vinh-long-1/KenhCoBan.m3u8", group: "hd" }
    ];

    const video = document.getElementById('video');
    let hls = new Hls();

    function playStream(url, element) {
        document.querySelectorAll('.channel-card').forEach(el => el.classList.remove('active'));
        element.classList.add('active');

        if (Hls.isSupported()) {
            hls.destroy();
            hls = new Hls();
            hls.loadSource(url);
            hls.attachMedia(video);
            hls.on(Hls.Events.MANIFEST_PARSED, () => video.play());
        } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
            video.src = url;
            video.play();
        }
    }

    function goFullScreen() {
        if (video.requestFullscreen) video.requestFullscreen();
        else if (video.webkitEnterFullscreen) video.webkitEnterFullscreen();
    }

    channels.forEach(channel => {
        const card = document.createElement('div');
        card.className = 'channel-card';
        card.innerHTML = `<span class="channel-name">${channel.name}</span>`;
        card.onclick = () => {
            playStream(channel.url, card);
            window.scrollTo({ top: 0, behavior: 'smooth' });
        };
        document.getElementById(`group-${channel.group}`).appendChild(card);
    });

    window.onload = () => {
        const firstCard = document.querySelector('.channel-card');
        if(firstCard) playStream(channels[0].url, firstCard);
    };
</script>

</body>
</html>
