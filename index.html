<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IPTV Tech Final</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        :root { --bg-dark: #0f0f0f; --action-blue: #0056b3; --fav-color: #ffcc00; --stat-color: #00ff00; }
        body { font-family: sans-serif; background: var(--bg-dark); color: #fff; margin: 0; padding: 0; overflow-x: hidden; -webkit-tap-highlight-color: transparent; }
        
        #video-viewport {
            position: relative; width: 100%; aspect-ratio: 16/9; background: #000;
            overflow: hidden; z-index: 1;
        }
        video { width: 100%; height: 100%; display: block; }

        /* Stats in Fullscreen */
        #fs-stats {
            position: absolute; top: 5px; left: 50%; transform: translateX(-50%);
            font-size: 10px; color: var(--stat-color); font-family: monospace;
            background: rgba(0,0,0,0.6); padding: 2px 8px; border-radius: 4px;
            display: none; z-index: 2147483647; white-space: nowrap;
        }
        .controls-overlay.active #fs-stats { display: block; }

        .controls-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); opacity: 0; transition: opacity 0.3s;
            z-index: 2147483647; display: flex; pointer-events: none;
        }
        .controls-overlay.active { opacity: 1; pointer-events: auto; }

        .sidebar {
            width: 170px; height: 100%; background: rgba(10,10,10,0.98);
            transform: translateX(-100%); transition: transform 0.2s ease;
            border-right: 1px solid #333; pointer-events: auto;
            overflow-y: auto; overscroll-behavior: contain;
        }
        .controls-overlay.active .sidebar { transform: translateX(0); }
        
        .side-item { padding: 12px 10px; border-bottom: 1px solid #222; text-align: center; cursor: pointer; }
        .side-item img { width: 90px; height: 45px; object-fit: contain; }
        .side-item span { display: block; font-size: 11px; font-weight: bold; margin-top: 4px; }

        /* Group Buttons */
        .btn-group { position: fixed; bottom: 20px; right: 20px; display: flex; gap: 10px; z-index: 2147483647; }
        .action-btn {
            background: var(--action-blue); color: white; border: 2px solid #fff;
            padding: 15px 20px; border-radius: 50px; font-weight: bold; font-size: 14px;
            cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }
        .reload-btn { background: #333; padding: 15px 18px; }

        /* State management */
        body.is-fs .reload-btn, body.is-fs #btn-enter { display: none; }
        #btn-exit { display: none; position: absolute; bottom: 20px; right: 20px; }
        body.is-fs #btn-exit { display: block; }

        .info { padding: 15px; border-bottom: 1px solid #333; }
        .info h2 { margin: 0; font-size: 18px; color: var(--fav-color); }
        .stats-row { font-family: monospace; font-size: 12px; color: var(--stat-color); margin-top: 5px; }

        .mobile-container { padding: 10px; padding-bottom: 80px; }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .grid-item { background: #1a1a1a; padding: 10px; border-radius: 8px; text-align: center; border: 1px solid #333; }
        
        @media (min-width: 992px) { 
            .mobile-container { display: none; } 
            #video-viewport { max-width: 80vw; margin: 20px auto; border-radius: 12px; }
        }
    </style>
</head>
<body>

<div id="video-viewport" onclick="showUI()">
    <video id="main-video" autoplay playsinline></video>
    <div id="fs-stats">Loading stats...</div>
    <div class="controls-overlay" id="ui-overlay">
        <div class="sidebar" id="side-list" onclick="event.stopPropagation()"></div>
        <button id="btn-exit" class="action-btn" onclick="handleFS(false, event)">THOÁT</button>
    </div>
</div>

<div class="btn-group">
    <button class="action-btn reload-btn" onclick="location.reload()">↻</button>
    <button id="btn-enter" class="action-btn" onclick="handleFS(true, event)">TOÀN MÀN HÌNH</button>
</div>

<div class="info">
    <h2 id="now-playing">VTV1 HD</h2>
    <div class="stats-row" id="web-stats">Bitrate: 0 | Res: 0x0 | FPS: 0</div>
</div>

<div class="mobile-container"><div class="grid" id="main-grid"></div></div>

<script>
    const channels = [
        { name: "Vĩnh Long 1", short: "THVL1", logo: "https://vn.xemtv.net/image/thvl1.png", url: "https://live.fptplay53.net/epzhd2/vinhlong1_vhls.smil/chunklist_b5000000.m3u8" },
        { name: "VTV1 HD", short: "VTV1", logo: "https://vn.xemtv.net/image/vtv1.png", url: "https://live.fptplay53.net/fnxch2/vtv1hd_abr.smil/chunklist.m3u8" },
        { name: "VTV2 HD", short: "VTV2", logo: "https://vn.xemtv.net/image/vtv2.png", url: "https://live.fptplay53.net/fnxch2/vtv2hd_abr.smil/chunklist.m3u8" },
        { name: "VTV3 HD", short: "VTV3", logo: "https://vn.xemtv.net/image/vtv3.png", url: "https://live.fptplay53.net/fnxch2/vtv3hd_abr.smil/chunklist.m3u8" },
        { name: "VTV4 HD", short: "VTV4", logo: "https://vn.xemtv.net/image/vtv4.png", url: "https://live.fptplay53.net/fnxch2/vtv4hd_abr.smil/chunklist.m3u8" },
        { name: "VTV5 HD", short: "VTV5", logo: "https://vn.xemtv.net/image/vtv5.png", url: "https://live-a.fptplay53.net/live/media/VTV5HD/live_hls_avc/index.m3u8" },
        { name: "VTV7 HD", short: "VTV7", logo: "https://vn.xemtv.net/image/vtv7.png", url: "https://live.fptplay53.net/fnxhd1/vtv7hd_vhls.smil/chunklist_b5000000.m3u8" },
        { name: "VTV8 HD", short: "VTV8", logo: "https://vn.xemtv.net/image/vtv8.png", url: "https://live.fptplay53.net/epzhd1/vtv8hd_vhls.smil/chunklist.m3u8" },
        { name: "VTV9 HD", short: "VTV9", logo: "https://vn.xemtv.net/image/vtv9.png", url: "https://toiyeuvietnam.dpdns.org/TuyetDoiKhongKinhDoanh/vtv9-hd/KenhCoBan.m3u8" },
        { name: "HTV7 HD", short: "HTV7", logo: "https://vn.xemtv.net/image/htv7.png", url: "https://live.fptplay53.net/epzch2/htv7hd_abr.smil/chunklist.m3u8" },
        { name: "HTV9 HD", short: "HTV9", logo: "https://vn.xemtv.net/image/htv9.png", url: "https://live.fptplay53.net/epzhd1/htv9hd_vhls.smil/chunklist.m3u8" },
        { name: "HTV1 HD", short: "HTV1", logo: "https://vn.xemtv.net/image/htv1.png", url: "https://live.fptplay53.net/epzhd1/htv1_hls.smil/chunklist.m3u8" },
        { name: "HTV2 HD", short: "HTV2", logo: "https://vn.xemtv.net/image/htv2.png", url: "https://live.fptplay53.net/epzhd1/htv2hd_vhls.smil/chunklist.m3u8" },
        { name: "HTV3 HD", short: "HTV3", logo: "https://vn.xemtv.net/image/htv3.png", url: "https://live.fptplay53.net/epzhd1/htv3_hls.smil/chunklist.m3u8" },
        { name: "Vietnam Today", short: "VNT", logo: "https://vn.xemtv.net/image/vietnamtoday.png", url: "https://live.fptplay53.net/fnxhd1/vntoday_vhls.smil/chunklist_b5000000.m3u8" }
    ];

    const v = document.getElementById('main-video'), view = document.getElementById('video-viewport');
    const overlay = document.getElementById('ui-overlay'), webStats = document.getElementById('web-stats'), fsStats = document.getElementById('fs-stats');
    let hls = new Hls(), timer;

    function showUI() {
        overlay.classList.add('active');
        clearTimeout(timer);
        timer = setTimeout(() => overlay.classList.remove('active'), 2000); // Giảm xuống 2s
    }

    function handleFS(enter, e) {
        if(e) e.stopPropagation();
        if(enter) {
            if(view.requestFullscreen) view.requestFullscreen();
            else if(view.webkitRequestFullscreen) view.webkitRequestFullscreen();
        } else {
            if(document.exitFullscreen) document.exitFullscreen();
            else if(document.webkitExitFullscreen) document.webkitExitFullscreen();
        }
    }

    document.addEventListener('fullscreenchange', () => document.body.classList.toggle('is-fs', !!document.fullscreenElement));
    document.addEventListener('webkitfullscreenchange', () => document.body.classList.toggle('is-fs', !!document.webkitIsFullScreen));

    // Cập nhật thông số kỹ thuật
    setInterval(() => {
        if (v.readyState > 0) {
            const quality = hls.levels[hls.currentLevel] || {};
            const bitrate = quality.bitrate ? (quality.bitrate / 1000000).toFixed(2) + " Mbps" : "Auto";
            const res = v.videoWidth + "x" + v.videoHeight;
            const fps = hls.streamController?.lastTimestamp ? "Stable" : "N/A"; 
            const txt = `Bitrate: ${bitrate} | Res: ${res} | Video: 1080p Target`;
            webStats.innerText = txt;
            fsStats.innerText = txt;
        }
    }, 2000);

    function play(c) {
        document.getElementById('now-playing').innerText = c.name;
        if (Hls.isSupported()) {
            hls.destroy(); hls = new Hls();
            hls.loadSource(c.url); hls.attachMedia(v);
            hls.on(Hls.Events.MANIFEST_PARSED, () => v.play());
        } else { v.src = c.url; v.play(); }
        overlay.classList.remove('active');
    }

    function init() {
        const side = document.getElementById('side-list'), grid = document.getElementById('main-grid');
        channels.forEach(c => {
            const sItem = document.createElement('div');
            sItem.className = 'side-item';
            sItem.innerHTML = `<img src="${c.logo}"><span>${c.short}</span>`;
            sItem.onclick = () => play(c);
            side.appendChild(sItem);

            const gItem = document.createElement('div');
            gItem.className = 'grid-item';
            gItem.innerHTML = `<img src="${c.logo}" style="width:100%"><p style="font-size:10px;margin:5px 0 0;">${c.name}</p>`;
            gItem.onclick = () => play(c);
            grid.appendChild(gItem);
        });
        const vtv1 = channels.find(c => c.short === "VTV1") || channels[0];
        play(vtv1);
    }
    init();
</script>
</body>
</html>
