<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IPTV Desktop & Mobile Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        :root { --bg-dark: #0f0f0f; --action-blue: #0056b3; --fav-color: #ffcc00; }
        body { font-family: "Roboto", Arial, sans-serif; background: var(--bg-dark); color: #fff; margin: 0; padding: 0; overflow: hidden; }
        
        /* Wrapper chính để phóng to */
        #player-wrapper { 
            position: relative; width: 100vw; height: 56.25vw; /* Tỷ lệ 16:9 */
            max-height: 100vh; background: #000; margin: 0 auto; 
        }

        video { width: 100%; height: 100%; display: block; object-fit: contain; }

        /* Lớp phủ Overlay - CỰC KỲ QUAN TRỌNG */
        .video-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); opacity: 0; transition: opacity 0.3s;
            z-index: 2147483647; /* Mức cao nhất để đè lên video khi fullscreen */
            display: flex; pointer-events: none;
        }
        .video-overlay.show { opacity: 1; pointer-events: auto; }

        /* Sidebar bên trong Overlay */
        .side-nav {
            width: 200px; height: 100%; background: #111;
            transform: translateX(-100%); transition: transform 0.3s ease;
            border-right: 1px solid #333; overflow-y: auto; pointer-events: auto;
        }
        .video-overlay.show .side-nav { transform: translateX(0); }
        
        .side-item { 
            padding: 15px 10px; border-bottom: 1px solid #222; 
            cursor: pointer; display: flex; flex-direction: column; align-items: center; 
        }
        .side-item:hover { background: #222; }
        .side-item img { width: 120px; height: 60px; object-fit: contain; }
        .side-item span { font-size: 13px; font-weight: bold; margin-top: 5px; color: #eee; }

        /* Nút Thoát (Chỉ hiện khi Fullscreen) */
        .exit-fs-btn {
            position: absolute; bottom: 30px; right: 30px;
            background: var(--action-blue); color: #fff; border: 2px solid #fff;
            padding: 15px 25px; border-radius: 10px; font-weight: bold;
            cursor: pointer; pointer-events: auto; display: none;
        }
        #player-wrapper:fullscreen .exit-fs-btn,
        #player-wrapper:-webkit-full-screen .exit-fs-btn { display: block; }

        /* Nút Xem Toàn Màn Hình (Floating) */
        .floating-fs-btn {
            position: fixed; bottom: 20px; right: 20px;
            background: var(--action-blue); color: #fff; border: 2px solid #fff;
            padding: 15px 25px; border-radius: 50px; font-weight: bold;
            z-index: 100; cursor: pointer;
        }
        /* Ẩn nút xem khi đã vào Fullscreen */
        #player-wrapper:fullscreen ~ .floating-fs-btn,
        #player-wrapper:-webkit-full-screen ~ .floating-fs-btn { display: none; }

        .current-info { padding: 15px; border-bottom: 1px solid #222; }
        .current-info h2 { margin: 0; color: var(--fav-color); font-size: 20px; }

        /* Danh sách dưới (Chỉ hiện trên Mobile) */
        #mobile-grid-container { 
            height: calc(100vh - 56.25vw - 60px); overflow-y: auto; padding: 10px; 
        }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        
        @media (min-width: 992px) {
            body { overflow: auto; }
            #player-wrapper { width: 80%; margin-top: 20px; border-radius: 12px; overflow: hidden; }
            #mobile-grid-container { display: none; } /* Desktop dùng sidebar là đủ */
        }

        .grid-item { background: #1a1a1a; padding: 10px; border-radius: 8px; text-align: center; border: 1px solid #333; }
        .grid-item img { width: 100%; aspect-ratio: 16/9; object-fit: contain; background: #000; border-radius: 4px; }
        .grid-item p { font-size: 11px; margin: 5px 0 0; font-weight: bold; }
    </style>
</head>
<body>

<div id="player-wrapper" onclick="toggleOverlay()">
    <video id="video" autoplay playsinline></video>
    
    <div class="video-overlay" id="overlay">
        <div class="side-nav" id="side-nav" onclick="event.stopPropagation()">
            </div>
        <button class="exit-fs-btn" onclick="exitFS(event)">THOÁT TOÀN MÀN HÌNH</button>
    </div>
</div>

<button class="floating-fs-btn" id="float-btn" onclick="enterFS()">XEM TOÀN MÀN HÌNH</button>

<div class="current-info">
    <h2 id="title">Đang tải...</h2>
</div>

<div id="mobile-grid-container">
    <div class="grid" id="main-grid"></div>
</div>

<script>
    const channels = [
        { name: "Vĩnh Long 1", short: "THVL1", logo: "https://static3.thvli.vn/assets/thumbnail/2025/09/12/pbe9c6gh_button_thvl1.png", url: "https://live.fptplay53.net/epzhd2/vinhlong1_vhls.smil/chunklist_b5000000.m3u8" },
        { name: "VTV1 HD", short: "VTV1", logo: "https://vn.xemtv.net/image/vtv1.png", url: "https://live.fptplay53.net/fnxch2/vtv1hd_abr.smil/chunklist.m3u8" },
        { name: "VTV3 HD", short: "VTV3", logo: "https://vn.xemtv.net/image/vtv3.png", url: "https://live.fptplay53.net/fnxch2/vtv3hd_abr.smil/chunklist.m3u8" },
        { name: "VTV2 HD", short: "VTV2", logo: "https://vn.xemtv.net/image/vtv2.png", url: "https://live.fptplay53.net/fnxch2/vtv2hd_abr.smil/chunklist.m3u8" },
        { name: "VTV4 HD", short: "VTV4", logo: "https://vn.xemtv.net/image/vtv4.png", url: "https://live.fptplay53.net/fnxch2/vtv4hd_abr.smil/chunklist.m3u8" },
        { name: "VTV5 HD", short: "VTV5", logo: "https://vn.xemtv.net/image/vtv5.png", url: "https://live-a.fptplay53.net/live/media/VTV5HD/live_hls_avc/index.m3u8" },
        { name: "HTV7 HD", short: "HTV7", logo: "https://vn.xemtv.net/image/htv7.png", url: "https://live.fptplay53.net/epzch2/htv7hd_abr.smil/chunklist.m3u8" },
        { name: "HTV9 HD", short: "HTV9", logo: "https://vn.xemtv.net/image/htv9.png", url: "https://live.fptplay53.net/epzhd1/htv9hd_vhls.smil/chunklist.m3u8" },
        { name: "Vietnam Today", short: "VNT", logo: "https://vn.xemtv.net/image/vietnamtoday.png", url: "https://live.fptplay53.net/fnxhd1/vntoday_vhls.smil/chunklist_b5000000.m3u8" }
    ];

    const video = document.getElementById('video');
    const wrapper = document.getElementById('player-wrapper');
    const overlay = document.getElementById('overlay');
    let hls = new Hls();
    let hideTimer;

    function toggleOverlay() {
        overlay.classList.add('show');
        clearTimeout(hideTimer);
        hideTimer = setTimeout(() => overlay.classList.remove('show'), 5000);
    }

    function enterFS() {
        if (wrapper.requestFullscreen) wrapper.requestFullscreen();
        else if (wrapper.webkitRequestFullscreen) wrapper.webkitRequestFullscreen();
        else if (video.webkitEnterFullscreen) video.webkitEnterFullscreen();
        
        if (screen.orientation && screen.orientation.lock) {
            screen.orientation.lock('landscape').catch(() => {});
        }
    }

    function exitFS(e) {
        e.stopPropagation();
        if (document.exitFullscreen) document.exitFullscreen();
        else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
        overlay.classList.remove('show');
    }

    function play(c, forceFS) {
        document.getElementById('title').innerText = c.name;
        if (Hls.isSupported()) {
            hls.loadSource(c.url); hls.attachMedia(video);
            hls.on(Hls.Events.MANIFEST_PARSED, () => {
                video.play();
                if (forceFS) enterFS();
            });
        } else {
            video.src = c.url; video.play();
            if (forceFS) enterFS();
        }
        overlay.classList.remove('show');
    }

    function init() {
        const side = document.getElementById('side-nav');
        const grid = document.getElementById('main-grid');
        channels.forEach(c => {
            // Add to Sidebar
            const sDiv = document.createElement('div');
            sDiv.className = 'side-item';
            sDiv.innerHTML = `<img src="${c.logo}"><span>${c.short}</span>`;
            sDiv.onclick = () => play(c, true);
            side.appendChild(sDiv);

            // Add to Grid (Mobile)
            const gDiv = document.createElement('div');
            gDiv.className = 'grid-item';
            gDiv.innerHTML = `<img src="${c.logo}"><p>${c.name}</p>`;
            gDiv.onclick = () => play(c, false);
            grid.appendChild(gDiv);
        });
        play(channels[0], false);
    }

    init();
</script>
</body>
</html>
