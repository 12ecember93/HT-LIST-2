<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GitHub IPTV - Netflix Style v2</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        :root { 
            --primary-color: #e50914; 
            --bg-dark: #141414; 
            --card-bg: #2f2f2f;
            --text-main: #ffffff;
        }
        
        body { 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            background: var(--bg-dark); 
            color: var(--text-main); 
            margin: 0; 
            overflow-x: hidden;
        }
        
        .video-wrapper { 
            position: sticky; 
            top: 0; 
            z-index: 1000; 
            background: #000; 
            width: 100%; 
            max-width: 1000px; 
            margin: 0 auto; 
        }
        video { width: 100%; aspect-ratio: 16/9; display: block; }
        
        .controls { padding: 10px; background: #141414; }
        .btn-fullscreen { 
            width: 100%; 
            padding: 15px; 
            font-size: 16px; 
            font-weight: bold;
            background: var(--primary-color); 
            color: white; 
            border: none; 
            border-radius: 4px; 
            cursor: pointer;
            text-transform: uppercase;
        }

        .container { padding: 10px 0 20px 15px; }
        
        .group-header { 
            font-size: 18px; 
            font-weight: bold; 
            margin: 20px 0 10px 0;
            color: #e5e5e5;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .scroll-row { 
            display: flex; 
            overflow-x: auto; 
            gap: 12px; 
            padding-bottom: 15px;
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
        }
        
        .scroll-row::-webkit-scrollbar { display: none; }
        .scroll-row { -ms-overflow-style: none; scrollbar-width: none; }

        .channel-card { 
            flex: 0 0 150px; 
            background: var(--card-bg); 
            height: 90px; 
            border-radius: 8px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            text-align: center;
            padding: 15px;
            font-size: 16px; 
            font-weight: 800; /* Super Bold cho điện thoại */
            cursor: pointer;
            transition: all 0.3s ease;
            border: 2px solid transparent;
            box-sizing: border-box;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        
        .channel-card:active { transform: scale(0.95); }
        
        .channel-card.active { 
            border-color: var(--primary-color); 
            background: #404040;
            box-shadow: 0 0 15px rgba(229, 9, 20, 0.4);
        }

        .channel-name {
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            line-height: 1.2;
        }
    </style>
</head>
<body>

<div class="video-wrapper">
    <video id="video" autoplay playsinline></video>
    <div class="controls">
        <button class="btn-fullscreen" onclick="goFullScreen()">📺 XEM TOÀN MÀN HÌNH</button>
    </div>
</div>

<div class="container">
    <div class="group-header">Nguồn FPT (Ổn định)</div>
    <div class="scroll-row" id="group-fpt"></div>

    <div class="group-header">Nguồn Dự Phòng</div>
    <div class="scroll-row" id="group-hd"></div>
</div>

<script>
    const channels = [
        // NHÓM FPT MỚI CẬP NHẬT
        { name: "VTV1 FPT", url: "https://live.fptplay53.net/fnxch2/vtv1hd_abr.smil/chunklist.m3u8", group: "fpt" },
        { name: "VTV2 FPT", url: "https://live.fptplay53.net/fnxch2/vtv2hd_abr.smil/chunklist.m3u8", group: "fpt" },
        { name: "VTV3 FPT", url: "https://live.fptplay53.net/fnxch2/vtv3hd_abr.smil/chunklist.m3u8", group: "fpt" },
        { name: "VTV4 FPT", url: "https://live.fptplay53.net/fnxch2/vtv4hd_abr.smil/chunklist.m3u8", group: "fpt" },
        { name: "VTV5 FPT", url: "https://live.fptplay53.net/epzch2/vtv5hd_abr.smil/chunklist.m3u8", group: "fpt" },
        { name: "VTV5 TNB", url: "https://live.fptplay53.net/fnxhd1/vtv5tnb_vhls.smil/chunklist.m3u8", group: "fpt" },
        { name: "VTV7 FPT", url: "https://live.fptplay53.net/fnxhd1/vtv7hd_vhls.smil/chunklist.m3u8", group: "fpt" },
        { name: "VTV8 FPT", url: "https://live.fptplay53.net/epzhd1/vtv8hd_vhls.smil/chunklist.m3u8", group: "fpt" },
        { name: "VTV9 FPT", url: "https://live.fptplay53.net/epzch2/vtv9hd_abr.smil/chunklist.m3u8", group: "fpt" },
        { name: "HTV1 FPT", url: "https://live.fptplay53.net/epzhd1/htv1_hls.smil/chunklist.m3u8", group: "fpt" },
        { name: "HTV2 FPT", url: "https://live.fptplay53.net/epzhd1/htv2hd_vhls.smil/chunklist.m3u8", group: "fpt" },
        { name: "HTV3 FPT", url: "https://live.fptplay53.net/epzhd1/htv3_hls.smil/chunklist.m3u8", group: "fpt" },
        { name: "HTV7 FPT", url: "https://live.fptplay53.net/epzch2/htv7hd_abr.smil/chunklist.m3u8", group: "fpt" },
        { name: "HTV9 FPT", url: "https://live.fptplay53.net/epzhd1/htv9hd_vhls.smil/chunklist.m3u8", group: "fpt" },
        { name: "VN Today", url: "https://live.fptplay53.net/fnxhd1/vntoday_vhls.smil/chunklist.m3u8", group: "fpt" },
        { name: "Vĩnh Long 1", url: "https://live.fptplay53.net/epzch2/vinhlong1_abr.smil/chunklist.m3u8", group: "fpt" },

        // NHÓM DỰ PHÒNG (GIỮ NGUYÊN)
        { name: "VTV1 HD", url: "https://toiyeuvietnam.dpdns.org/TuyetDoiKhongKinhDoanh/vtv1-hd/KenhCoBan.m3u8", group: "hd" },
        { name: "VTV2 HD", url: "https://toiyeuvietnam.dpdns.org/TuyetDoiKhongKinhDoanh/vtv2-hd/KenhCoBan.m3u8", group: "hd" },
        { name: "VTV3 HD", url: "https://toiyeuvietnam.dpdns.org/TuyetDoiKhongKinhDoanh/vtv3-hd/KenhCoBan.m3u8", group: "hd" },
        { name: "VTV5 HD", url: "https://toiyeuvietnam.dpdns.org/TuyetDoiKhongKinhDoanh/vtv5-hd/KenhCoBan.m3u8", group: "hd" },
        { name: "HTV7 HD", url: "https://toiyeuvietnam.dpdns.org/TuyetDoiKhongKinhDoanh/htv7-hd/KenhCoBan.m3u8", group: "hd" },
        { name: "HTV9 HD", url: "https://toiyeuvietnam.dpdns.org/TuyetDoiKhongKinhDoanh/htv9-hd/KenhCoBan.m3u8", group: "hd" }
    ];

    const video = document.getElementById('video');
    let hls = new Hls();

    function playStream(url, element) {
        document.querySelectorAll('.channel-card').forEach(el => el.classList.remove('active'));
        element.classList.add('active');

        if (Hls.isSupported()) {
            hls.destroy();
            hls = new Hls();
            hls.loadSource(url);
            hls.attachMedia(video);
            hls.on(Hls.Events.MANIFEST_PARSED, () => video.play());
        } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
            video.src = url;
            video.play();
        }
    }

    function goFullScreen() {
        if (video.requestFullscreen) video.requestFullscreen();
        else if (video.webkitEnterFullscreen) video.webkitEnterFullscreen();
    }

    channels.forEach(channel => {
        const card = document.createElement('div');
        card.className = 'channel-card';
        card.innerHTML = `<span class="channel-name">${channel.name}</span>`;
        card.onclick = () => {
            playStream(channel.url, card);
            window.scrollTo({ top: 0, behavior: 'smooth' });
        };
        const targetGroup = document.getElementById(`group-${channel.group}`);
        if(targetGroup) targetGroup.appendChild(card);
    });

    window.onload = () => {
        const firstCard = document.querySelector('.channel-card');
        if(firstCard) playStream(channels[0].url, firstCard);
    };
</script>

</body>
</html>
