<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>TV PRO - FAST START</title>
    <link rel="icon" type="image/jpeg" href="https://raw.githubusercontent.com/12ecember93/HT-iptv/main/httv.jpg">
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        :root { --bg-dark: #000; --yellow: #ffcc00; }
        body { font-family: sans-serif; background: var(--bg-dark); color: #fff; margin: 0; padding: 0; overflow: hidden; }
        #video-viewport { position: relative; width: 100vw; height: 100vh; background: #000; }
        video { width: 100%; height: 100%; object-fit: contain; }
        
        /* UI Danh sách kênh */
        .controls-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.3); opacity: 0; transition: opacity 0.3s; z-index: 50; pointer-events: none; }
        .controls-overlay.active { opacity: 1; pointer-events: auto; }
        .sidebar { width: 140px; height: 100%; background: rgba(10,10,10,0.95); transform: translateX(-100%); transition: transform 0.3s; overflow-y: auto; border-right: 1px solid #333; }
        .controls-overlay.active .sidebar { transform: translateX(0); }
        .side-item { padding: 15px 10px; border-bottom: 1px solid #222; text-align: center; opacity: 0.5; }
        .side-item.active { opacity: 1; border-left: 4px solid var(--yellow); background: rgba(255,204,0,0.1); }
        .side-item img { max-width: 100%; max-height: 45px; object-fit: contain; }

        #loading { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: var(--yellow); font-weight: bold; z-index: 60; text-shadow: 0 0 10px #000; }
    </style>
</head>
<body>

<div id="video-viewport" onclick="toggleUI()">
    <div id="loading">KẾT NỐI...</div>
    <video id="main-video" autoplay playsinline muted></video>
    
    <div class="controls-overlay" id="ui-overlay">
        <div class="sidebar" id="sidebar-content"></div>
    </div>
</div>

<script>
    const v = document.getElementById('main-video');
    const view = document.getElementById('video-viewport');
    const overlay = document.getElementById('ui-overlay');
    const loader = document.getElementById('loading');
    let hls = new Hls({ autoStartLoad: true });
    let uiTimer, channels = [];

    // Tự động vào Fullscreen khi video phát
    function requestFS() {
        if (view.requestFullscreen) view.requestFullscreen();
        else if (v.webkitEnterFullscreen) v.webkitEnterFullscreen();
        if (screen.orientation && screen.orientation.lock) screen.orientation.lock('landscape').catch(() => {});
    }

    function playChannel(c) {
        loader.style.display = 'block';
        document.querySelectorAll('.side-item').forEach(el => el.classList.remove('active'));
        const activeItem = document.querySelector(`[data-url="${c.url}"]`);
        if(activeItem) activeItem.classList.add('active');

        if (Hls.isSupported()) {
            hls.detachMedia();
            hls.loadSource(c.url);
            hls.attachMedia(v);
            hls.on(Hls.Events.MANIFEST_PARSED, () => {
                v.play().then(() => {
                    requestFS(); // Thử vào Fullscreen ngay khi phát thành công
                    v.muted = false; // Mở tiếng lại
                }).catch(err => {
                    console.log("Autoplay retry...");
                    v.play(); // Thử lại lần nữa
                });
            });
        } else {
            v.src = c.url;
            v.play();
        }
    }

    v.onplaying = () => { loader.style.display = 'none'; };

    function toggleUI() {
        overlay.classList.add('active');
        clearTimeout(uiTimer);
        uiTimer = setTimeout(() => overlay.classList.remove('active'), 3000);
    }

    async function init() {
        try {
            const res = await fetch('playlist.json');
            const data = await res.json();
            channels = Object.values(data).flat();
            
            const side = document.getElementById('sidebar-content');
            channels.forEach(c => {
                const item = document.createElement('div');
                item.className = 'side-item';
                item.setAttribute('data-url', c.url);
                item.innerHTML = `<img src="${c.logo}" loading="lazy">`;
                item.onclick = (e) => { e.stopPropagation(); playChannel(c); };
                side.appendChild(item);
            });

            // PHÁT NGAY KÊNH MẶC ĐỊNH
            const vtv1 = channels.find(c => c.short === 'VTV1') || channels[0];
            if(vtv1) playChannel(vtv1);

        } catch (e) { loader.innerText = "LỖI TẢI KÊNH"; }
    }

    // Chạy ngay khi DOM sẵn sàng
    window.addEventListener('DOMContentLoaded', init);

    // Hỗ trợ Remote Android TV (Bấm bất kỳ phím nào cũng sẽ thử mở tiếng và Fullscreen)
    document.addEventListener('keydown', (e) => {
        v.muted = false;
        requestFS();
        if (e.keyCode === 13 || e.keyCode === 23) toggleUI();
    });
</script>
</body>
</html>
