<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub IPTV - Mobile Optimized</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        :root { 
            --primary-color: #007bff; 
            --bg-dark: #0f0f0f; 
            --card-bg: #252525;
            --text-main: #ffffff;
        }
        
        body { 
            font-family: -apple-system, system-ui, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background: var(--bg-dark); 
            color: var(--text-main); 
            margin: 0; 
            padding-bottom: env(safe-area-inset-bottom); /* Tối ưu cho iPhone đời mới */
        }
        
        /* Video Player Section */
        .video-wrapper { 
            position: sticky; 
            top: 0; 
            z-index: 1000; 
            background: #000; 
            width: 100%; 
            max-width: 1000px; 
            margin: 0 auto; 
        }
        video { width: 100%; aspect-ratio: 16/9; display: block; background: #000; }
        
        /* Fullscreen Button - TO VÀ RÕ */
        .controls { padding: 12px; background: #1a1a1a; border-bottom: 1px solid #333; }
        .btn-fullscreen { 
            width: 100%; 
            padding: 18px; 
            font-size: 20px; /* Chữ to hơn */
            font-weight: 800; /* Đậm hơn */
            background: var(--primary-color); 
            color: white; 
            border: none; 
            border-radius: 12px; 
            cursor: pointer; 
            text-transform: uppercase;
            box-shadow: 0 4px 10px rgba(0, 123, 255, 0.3);
        }

        /* Danh sách kênh */
        .container { max-width: 1000px; margin: 0 auto; padding: 10px; }
        
        .group-header { 
            background: #333;
            padding: 10px 15px;
            border-radius: 8px;
            margin: 20px 0 12px 0;
            font-weight: bold;
            font-size: 14px;
            color: #4db8ff;
            display: flex;
            align-items: center;
        }
        .group-header::before {
            content: "";
            width: 4px;
            height: 18px;
            background: var(--primary-color);
            margin-right: 10px;
            border-radius: 2px;
        }
        
        /* Grid Layout cho Mobile */
        .grid { 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); /* 2 cột trên mobile */
            gap: 12px; 
        }
        
        /* Desktop: 3 hoặc 4 cột */
        @media (min-width: 768px) {
            .grid { grid-template-columns: repeat(4, 1fr); }
        }

        /* Thẻ Kênh - TỐI ƯU BOLD VÀ TO */
        .channel-card { 
            background: var(--card-bg); 
            padding: 20px 10px; 
            border-radius: 12px; 
            text-align: center; 
            cursor: pointer; 
            font-size: 17px; /* Tăng cỡ chữ */
            font-weight: 700; /* BOLD đậm */
            border: 2px solid transparent; 
            display: flex; 
            flex-direction: column;
            align-items: center; 
            justify-content: center;
            min-height: 60px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            transition: all 0.2s ease;
        }
        
        .channel-card:active { transform: scale(0.95); background: #333; }
        
        .channel-card.active { 
            border-color: var(--primary-color); 
            background: rgba(0, 123, 255, 0.15); 
            color: var(--primary-color);
            box-shadow: 0 0 15px rgba(0, 123, 255, 0.4);
        }
    </style>
</head>
<body>

<div class="video-wrapper">
    <video id="video" autoplay playsinline></video>
    <div class="controls">
        <button class="btn-fullscreen" onclick="goFullScreen()">🔳 PHÓNG TO MÀN HÌNH</button>
    </div>
</div>

<div class="container">
    <div class="group-header">NGUỒN FPT (ỔN ĐỊNH)</div>
    <div class="grid" id="group-fpt"></div>

    <div class="group-header">NGUỒN DỰ PHÒNG (DÀNH CHO TV)</div>
    <div class="grid" id="group-hd"></div>
</div>

<script>
    const channels = [
        { name: "VTV1 FPT", url: "https://live.fptplay53.net/fnxch2/vtv1hd_abr.smil/chunklist.m3u8", group: "fpt" },
        { name: "VTV2 FPT", url: "https://live.fptplay53.net/fnxch2/vtv2hd_abr.smil/chunklist.m3u8", group: "fpt" },
        { name: "VTV3 FPT", url: "https://live.fptplay53.net/fnxch2/vtv3hd_abr.smil/chunklist.m3u8", group: "fpt" },
        { name: "VTV4 FPT", url: "https://live.fptplay53.net/fnxch2/vtv4hd_abr.smil/chunklist.m3u8", group: "fpt" },
        { name: "VTV5 FPT", url: "https://live-a.fptplay53.net/live/media/VTV5HD/live_hls_avc/index.m3u8", group: "fpt" },
        { name: "THVL1 FPT", url: "https://live.fptplay53.net/epzch2/vinhlong1_abr.smil/chunklist_b4200000.m3u8", group: "fpt" },
        
        { name: "VTV1 HD", url: "https://toiyeuvietnam.dpdns.org/TuyetDoiKhongKinhDoanh/vtv1-hd/KenhCoBan.m3u8", group: "hd" },
        { name: "VTV2 HD", url: "https://toiyeuvietnam.dpdns.org/TuyetDoiKhongKinhDoanh/vtv2-hd/KenhCoBan.m3u8", group: "hd" },
        { name: "VTV3 HD", url: "https://toiyeuvietnam.dpdns.org/TuyetDoiKhongKinhDoanh/vtv3-hd/KenhCoBan.m3u8", group: "hd" },
        { name: "VTV4 HD", url: "https://toiyeuvietnam.dpdns.org/TuyetDoiKhongKinhDoanh/vtv4-hd/KenhCoBan.m3u8", group: "hd" },
        { name: "VTV5 HD", url: "https://toiyeuvietnam.dpdns.org/TuyetDoiKhongKinhDoanh/vtv5-hd/KenhCoBan.m3u8", group: "hd" },
        { name: "VTV7 HD", url: "https://toiyeuvietnam.dpdns.org/TuyetDoiKhongKinhDoanh/vtv7-hd/KenhCoBan.m3u8", group: "hd" },
        { name: "VTV8 HD", url: "https://toiyeuvietnam.dpdns.org/TuyetDoiKhongKinhDoanh/vtv8-hd/KenhCoBan.m3u8", group: "hd" },
        { name: "VTV9 HD", url: "https://toiyeuvietnam.dpdns.org/TuyetDoiKhongKinhDoanh/vtv9-hd/KenhCoBan.m3u8", group: "hd" },
        { name: "VTV 10", url: "https://toiyeuvietnam.dpdns.org/TuyetDoiKhongKinhDoanh/vtv10/KenhCoBan.m3u8", group: "hd" },
        { name: "HTV1", url: "https://toiyeuvietnam.dpdns.org/TuyetDoiKhongKinhDoanh/htv1/KenhCoBan.m3u8", group: "hd" },
        { name: "HTV2", url: "https://toiyeuvietnam.dpdns.org/TuyetDoiKhongKinhDoanh/htv2/KenhCoBan.m3u8", group: "hd" },
        { name: "HTV3", url: "https://toiyeuvietnam.dpdns.org/TuyetDoiKhongKinhDoanh/htv3/KenhCoBan.m3u8", group: "hd" },
        { name: "HTV4", url: "https://toiyeuvietnam.dpdns.org/TuyetDoiKhongKinhDoanh/htv4/KenhCoBan.m3u8", group: "hd" },
        { name: "HTV7 HD", url: "https://toiyeuvietnam.dpdns.org/TuyetDoiKhongKinhDoanh/htv7-hd/KenhCoBan.m3u8", group: "hd" },
        { name: "HTV9 HD", url: "https://toiyeuvietnam.dpdns.org/TuyetDoiKhongKinhDoanh/htv9-hd/KenhCoBan.m3u8", group: "hd" },
        { name: "THVL1", url: "https://toiyeuvietnam.dpdns.org/TuyetDoiKhongKinhDoanh/vinh-long-1/KenhCoBan.m3u8", group: "hd" }
    ];

    const video = document.getElementById('video');
    let hls = new Hls();

    function playStream(url, element) {
        document.querySelectorAll('.channel-card').forEach(el => el.classList.remove('active'));
        element.classList.add('active');

        if (Hls.isSupported()) {
            hls.destroy();
            hls = new Hls();
            hls.loadSource(url);
            hls.attachMedia(video);
            hls.on(Hls.Events.MANIFEST_PARSED, () => video.play());
        } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
            video.src = url;
            video.play();
        }
    }

    function goFullScreen() {
        if (video.requestFullscreen) video.requestFullscreen();
        else if (video.webkitEnterFullscreen) video.webkitEnterFullscreen(); // Cho iOS Safari
        else if (video.webkitRequestFullscreen) video.webkitRequestFullscreen();
    }

    // Render channels
    channels.forEach(channel => {
        const card = document.createElement('div');
        card.className = 'channel-card';
        card.innerHTML = `<span>${channel.name}</span>`;
        card.onclick = () => {
            playStream(channel.url, card);
            window.scrollTo({ top: 0, behavior: 'smooth' });
        };
        document.getElementById(`group-${channel.group}`).appendChild(card);
    });

    // Tự động play kênh đầu tiên
    window.onload = () => {
        const firstCard = document.querySelector('.channel-card');
        if(firstCard) playStream(channels[0].url, firstCard);
    };
</script>

</body>
</html>
