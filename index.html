<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GitHub IPTV - Final Safari</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        :root { --bg-dark: #0f0f0f; --primary-color: #f00; --fav-color: #ffcc00; --action-blue: #0056b3; }
        body { font-family: "Roboto", Arial, sans-serif; background: var(--bg-dark); color: #fff; margin: 0; padding: 0; overflow-x: hidden; -webkit-tap-highlight-color: transparent; }
        
        /* Player Box */
        .video-container { position: sticky; top: 0; z-index: 1000; background: #000; width: 100%; aspect-ratio: 16/9; }
        video { width: 100%; height: 100%; display: block; }

        /* Overlay & Sidebar */
        .video-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.3); opacity: 0; transition: opacity 0.3s; z-index: 1001; 
            display: flex; pointer-events: none;
        }
        .video-overlay.show { opacity: 1; pointer-events: auto; }

        .side-nav {
            width: 180px; height: 100%; background: rgba(10,10,10,0.98);
            display: flex; flex-direction: column; overflow-y: auto;
            transform: translateX(-100%); transition: transform 0.3s ease;
            border-right: 2px solid #333; scrollbar-width: none;
        }
        .video-overlay.show .side-nav { transform: translateX(0); }
        .side-item { padding: 15px 10px; display: flex; flex-direction: column; align-items: center; border-bottom: 1px solid #222; cursor: pointer; }
        .side-item img { width: 110px; height: 55px; object-fit: contain; pointer-events: none; }
        .side-item span { font-size: 13px; font-weight: bold; color: #ddd; margin-top: 5px; pointer-events: none; }

        /* Nút Điều Khiển */
        .exit-fs-btn {
            position: absolute; bottom: 20px; right: 20px;
            background: var(--action-blue); color: white; border: 2px solid #fff; 
            padding: 12px 20px; border-radius: 10px; font-weight: 900; font-size: 14px;
        }

        .floating-fs-btn {
            position: fixed; bottom: 20px; right: 20px;
            background: var(--action-blue); color: white; border: 2px solid #fff;
            padding: 18px 25px; border-radius: 50px; font-weight: 900; font-size: 16px;
            z-index: 999; box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }

        .current-title { padding: 12px 15px; font-size: 18px; font-weight: 800; color: var(--fav-color); border-bottom: 1px solid #222; margin: 0; }

        /* Grid Danh Sách (Mobile Hiện - Desktop Ẩn) */
        .container { max-width: 1200px; margin: 0 auto; padding: 10px; padding-bottom: 100px; }
        .channel-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        
        @media (min-width: 992px) { 
            .container { display: none; } /* Desktop ẩn list dưới */
            .video-container { max-width: 85vw; margin: 20px auto; border-radius: 15px; overflow: hidden; }
        }

        .channel-item { background: #1a1a1a; border-radius: 10px; padding: 10px; display: flex; flex-direction: column; align-items: center; border: 1px solid #333; cursor: pointer; }
        .thumb-box { width: 100%; aspect-ratio: 16/9; background: #252525; border-radius: 6px; display: flex; align-items: center; justify-content: center; overflow: hidden; margin-bottom: 6px; }
        .thumb-box img { width: 85%; height: 85%; object-fit: contain; }
        .channel-name { font-size: 11px; font-weight: 700; text-align: center; color: #fff; }
    </style>
</head>
<body>

<div class="video-container" id="player-box" onclick="handleVideoTouch()">
    <video id="video" autoplay playsinline controlsList="nodownload"></video>
    <div class="video-overlay" id="overlay">
        <div class="side-nav" id="side-nav"></div>
        <button class="exit-fs-btn" onclick="exitFS(event)">THOÁT TOÀN MÀN HÌNH</button>
    </div>
</div>

<button class="floating-fs-btn" id="float-btn" onclick="toggleFS()">XEM TOÀN MÀN HÌNH</button>

<p class="current-title" id="current-title">Đang tải...</p>

<div class="container" id="mobile-list">
    <div class="channel-grid" id="main-grid"></div>
</div>

<script>
    const channels = [
        { id: "vl1", short: "THVL1", name: "Vĩnh Long 1", logo: "https://static3.thvli.vn/assets/thumbnail/2025/09/12/pbe9c6gh_button_thvl1.png", url: "https://live.fptplay53.net/epzhd2/vinhlong1_vhls.smil/chunklist_b5000000.m3u8" },
        { id: "v1", short: "VTV1", name: "VTV1 HD", logo: "https://vn.xemtv.net/image/vtv1.png", url: "https://live.fptplay53.net/fnxch2/vtv1hd_abr.smil/chunklist.m3u8" },
        { id: "v3", short: "VTV3", name: "VTV3 HD", logo: "https://vn.xemtv.net/image/vtv3.png", url: "https://live.fptplay53.net/fnxch2/vtv3hd_abr.smil/chunklist.m3u8" },
        { id: "v2", short: "VTV2", name: "VTV2 HD", logo: "https://vn.xemtv.net/image/vtv2.png", url: "https://live.fptplay53.net/fnxch2/vtv2hd_abr.smil/chunklist.m3u8" },
        { id: "v4", short: "VTV4", name: "VTV4 HD", logo: "https://vn.xemtv.net/image/vtv4.png", url: "https://live.fptplay53.net/fnxch2/vtv4hd_abr.smil/chunklist.m3u8" },
        { id: "v5", short: "VTV5", name: "VTV5 HD", logo: "https://vn.xemtv.net/image/vtv5.png", url: "https://live-a.fptplay53.net/live/media/VTV5HD/live_hls_avc/index.m3u8" },
        { id: "vct", short: "VTV CT", name: "VTV Cần Thơ", logo: "https://vn.xemtv.net/image/vtvcantho.png", url: "https://live.fptplay53.net/fnxch2/vtvcantho_abr.smil/chunklist_b4200000.m3u8" },
        { id: "v7", short: "VTV7", name: "VTV7 HD", logo: "https://vn.xemtv.net/image/vtv7.png", url: "https://live.fptplay53.net/fnxhd1/vtv7hd_vhls.smil/chunklist_b5000000.m3u8" },
        { id: "v8", short: "VTV8", name: "VTV8 HD", logo: "https://vn.xemtv.net/image/vtv8.png", url: "https://live.fptplay53.net/epzhd1/vtv8hd_vhls.smil/chunklist.m3u8" },
        { id: "v9", short: "VTV9", name: "VTV9 HD", logo: "https://vn.xemtv.net/image/vtv9.png", url: "https://toiyeuvietnam.dpdns.org/TuyetDoiKhongKinhDoanh/vtv9-hd/KenhCoBan.m3u8" },
        { id: "h1", short: "HTV1", name: "HTV1 HD", logo: "https://vn.xemtv.net/image/htv1.png", url: "https://live.fptplay53.net/epzhd1/htv1_hls.smil/chunklist.m3u8" },
        { id: "h2", short: "HTV2", name: "HTV2 HD", logo: "https://vn.xemtv.net/image/htv2.png", url: "https://live.fptplay53.net/epzhd1/htv2hd_vhls.smil/chunklist.m3u8" },
        { id: "h7", short: "HTV7", name: "HTV7 HD", logo: "https://vn.xemtv.net/image/htv7.png", url: "https://live.fptplay53.net/epzch2/htv7hd_abr.smil/chunklist.m3u8" },
        { id: "h9", short: "HTV9", name: "HTV9 HD", logo: "https://vn.xemtv.net/image/htv9.png", url: "https://live.fptplay53.net/epzhd1/htv9hd_vhls.smil/chunklist.m3u8" },
        { id: "h3", short: "HTV3", name: "HTV3 HD", logo: "https://vn.xemtv.net/image/htv3.png", url: "https://live.fptplay53.net/epzhd1/htv3_hls.smil/chunklist.m3u8" },
        { id: "vnt", short: "VNT", name: "Vietnam Today", logo: "https://vn.xemtv.net/image/vietnamtoday.png", url: "https://live.fptplay53.net/fnxhd1/vntoday_vhls.smil/chunklist_b5000000.m3u8" }
    ];

    const video = document.getElementById('video');
    const overlay = document.getElementById('overlay');
    const floatBtn = document.getElementById('float-btn');
    let hls = new Hls();
    let hideTimer;

    function handleVideoTouch() {
        overlay.classList.add('show');
        clearTimeout(hideTimer);
        hideTimer = setTimeout(() => overlay.classList.remove('show'), 5000);
    }

    function toggleFS() {
        // Cố gắng xoay ngang cho Android
        if (screen.orientation && screen.orientation.lock) {
            screen.orientation.lock('landscape').catch(() => {});
        }

        // Ưu tiên Fullscreen API cho video (tốt nhất cho Safari iOS)
        if (video.webkitEnterFullscreen) {
            video.webkitEnterFullscreen();
        } else if (video.requestFullscreen) {
            video.requestFullscreen();
        } else if (document.getElementById('player-box').requestFullscreen) {
            document.getElementById('player-box').requestFullscreen();
        }
    }

    function exitFS(e) {
        if(e) e.stopPropagation();
        if (document.exitFullscreen) document.exitFullscreen();
        else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
        overlay.classList.remove('show');
    }

    function playStream(channel, isFromSidebar) {
        document.getElementById('current-title').innerText = channel.name;
        
        // HLS Support (Chrome/Firefox/Android)
        if (Hls.isSupported()) {
            hls.loadSource(channel.url);
            hls.attachMedia(video);
            hls.on(Hls.Events.MANIFEST_PARSED, () => {
                video.play();
                if (isFromSidebar) toggleFS();
            });
        } 
        // Native Support (Safari/iOS)
        else if (video.canPlayType('application/vnd.apple.mpegurl')) {
            video.src = channel.url;
            video.play();
            if (isFromSidebar) toggleFS();
        }
        overlay.classList.remove('show');
    }

    function initApp() {
        const side = document.getElementById('side-nav');
        const grid = document.getElementById('main-grid');
        
        channels.forEach(c => {
            // Sidebar: Bỏ title, giữ ghim 3 kênh đầu
            const sItem = document.createElement('div');
            sItem.className = 'side-item';
            sItem.innerHTML = `<img src="${c.logo}"><span>${c.short}</span>`;
            sItem.onclick = (e) => { e.stopPropagation(); playStream(c, true); };
            side.appendChild(sItem);

            // Grid: Hiện lại danh sách chọn ở dưới (cho Mobile)
            const gItem = document.createElement('div');
            gItem.className = 'channel-item';
            gItem.innerHTML = `<div class="thumb-box"><img src="${c.logo}"></div><div class="channel-name">${c.name}</div>`;
            gItem.onclick = () => playStream(c, false);
            grid.appendChild(gItem);
        });
    }

    window.onload = () => { 
        initApp(); 
        playStream(channels[0], false); 
    };

    // Theo dõi trạng thái Fullscreen để hiện/ẩn nút nổi
    document.addEventListener('fullscreenchange', () => {
        floatBtn.style.display = document.fullscreenElement ? 'none' : 'block';
    });
    document.addEventListener('webkitfullscreenchange', () => {
        floatBtn.style.display = document.webkitIsFullScreen ? 'none' : 'block';
    });
</script>
</body>
</html>
