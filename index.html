<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GitHub IPTV - YouTube Style Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        :root { 
            --bg-dark: #0f0f0f; 
            --text-main: #fff;
            --text-sub: #aaa;
            --primary-color: #f00; 
            --active-bg: rgba(255, 255, 255, 0.1);
        }
        
        body { 
            font-family: "Roboto", Arial, sans-serif; 
            background: var(--bg-dark); 
            color: var(--text-main); 
            margin: 0; 
            padding: 0;
        }
        
        /* Player cố định */
        .video-player { 
            position: sticky; 
            top: 0; 
            z-index: 1000; 
            background: #000; 
            width: 100%; 
            aspect-ratio: 16/9;
        }
        video { width: 100%; height: 100%; display: block; }

        .fullscreen-btn {
            position: absolute; bottom: 10px; right: 10px;
            background: rgba(0,0,0,0.7); color: white; border: none;
            padding: 8px 15px; border-radius: 20px; font-weight: bold; font-size: 12px;
        }
        
        /* Thông tin video */
        .video-info { padding: 15px; border-bottom: 5px solid #222; }
        .current-title { font-size: 18px; font-weight: 800; margin: 0; color: #fff; }
        .current-desc { font-size: 13px; color: var(--text-sub); margin-top: 5px; }

        /* Danh sách nhóm */
        .container { padding-bottom: 30px; }
        .group-header { 
            padding: 15px 15px 5px 15px; 
            font-size: 15px; 
            font-weight: bold; 
            color: #fff;
            display: flex;
            align-items: center;
        }
        .group-header i { margin-right: 8px; color: var(--primary-color); }

        /* Thẻ kênh */
        .channel-item { 
            display: flex; align-items: center; 
            padding: 12px 15px; cursor: pointer;
        }
        .channel-item:active { background: #2a2a2a; }
        .channel-item.active { background: var(--active-bg); }
        
        .thumb { 
            width: 100px; height: 56px; 
            background: #2a2a2a; border-radius: 8px;
            margin-right: 12px; display: flex;
            align-items: center; justify-content: center;
            font-size: 10px; color: #555; font-weight: bold;
            flex-shrink: 0; border: 1px solid #333;
        }
        .active .thumb { border-color: var(--primary-color); color: var(--primary-color); }

        .meta { flex: 1; overflow: hidden; }
        .name { font-size: 15px; font-weight: 700; margin: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .sub-name { font-size: 12px; color: var(--text-sub); margin-top: 3px; }
        .active .name { color: var(--primary-color); }
    </style>
</head>
<body>

<div class="video-player">
    <video id="video" autoplay playsinline></video>
    <button class="fullscreen-btn" onclick="goFullScreen()">TOÀN MÀN HÌNH</button>
</div>

<div class="video-info">
    <p class="current-title" id="current-title">Đang tải...</p>
    <p class="current-desc">Trình phát IPTV cá nhân trên GitHub</p>
</div>

<div class="container" id="main-list">
    </div>

<script>
    const channels = [
        // NHÓM VTV
        { name: "VTV1 FPT", url: "https://live.fptplay53.net/fnxch2/vtv1hd_abr.smil/chunklist.m3u8", group: "VTV" },
        { name: "VTV2 FPT", url: "https://live.fptplay53.net/fnxch2/vtv2hd_abr.smil/chunklist.m3u8", group: "VTV" },
        { name: "VTV3 FPT", url: "https://live.fptplay53.net/fnxch2/vtv3hd_abr.smil/chunklist.m3u8", group: "VTV" },
        { name: "VTV4 FPT", url: "https://live.fptplay53.net/fnxch2/vtv4hd_abr.smil/chunklist.m3u8", group: "VTV" },
        { name: "VTV5 FPT", url: "https://live-a.fptplay53.net/live/media/VTV5HD/live_hls_avc/index.m3u8", group: "VTV" },
        { name: "VTV5 TNB", url: "https://live.fptplay53.net/fnxhd1/vtv5tnb_vhls.smil/chunklist.m3u8", group: "VTV" },
        { name: "VTV7 FPT", url: "https://live.fptplay53.net/fnxhd1/vtv7hd_vhls.smil/chunklist.m3u8", group: "VTV" },
        { name: "VTV8 FPT", url: "https://live.fptplay53.net/epzhd1/vtv8hd_vhls.smil/chunklist.m3u8", group: "VTV" },
        { name: "VTV9 FPT", url: "https://live.fptplay53.net/epzch2/vtv9hd_abr.smil/chunklist.m3u8", group: "VTV" },
        
        // NHÓM HTV
        { name: "HTV1 FPT", url: "https://live.fptplay53.net/epzhd1/htv1_hls.smil/chunklist.m3u8", group: "HTV" },
        { name: "HTV2 FPT", url: "https://live.fptplay53.net/epzhd1/htv2hd_vhls.smil/chunklist.m3u8", group: "HTV" },
        { name: "HTV3 FPT", url: "https://live.fptplay53.net/epzhd1/htv3_hls.smil/chunklist.m3u8", group: "HTV" },
        { name: "HTV7 FPT", url: "https://live.fptplay53.net/epzch2/htv7hd_abr.smil/chunklist.m3u8", group: "HTV" },
        { name: "HTV9 FPT", url: "https://live.fptplay53.net/epzhd1/htv9hd_vhls.smil/chunklist.m3u8", group: "HTV" },

        // NHÓM THVL & KHÁC
        { name: "Vĩnh Long 1", url: "https://live.fptplay53.net/epzch2/vinhlong1_abr.smil/chunklist.m3u8", group: "THVL & KHÁC" },
        { name: "VN Today", url: "https://live.fptplay53.net/fnxhd1/vntoday_vhls.smil/chunklist.m3u8", group: "THVL & KHÁC" },

        // NHÓM DỰ PHÒNG
        { name: "VTV1 HD (DP)", url: "https://toiyeuvietnam.dpdns.org/TuyetDoiKhongKinhDoanh/vtv1-hd/KenhCoBan.m3u8", group: "DỰ PHÒNG (KHÔNG CORS)" },
        { name: "VTV3 HD (DP)", url: "https://toiyeuvietnam.dpdns.org/TuyetDoiKhongKinhDoanh/vtv3-hd/KenhCoBan.m3u8", group: "DỰ PHÒNG (KHÔNG CORS)" },
        { name: "HTV7 HD (DP)", url: "https://toiyeuvietnam.dpdns.org/TuyetDoiKhongKinhDoanh/htv7-hd/KenhCoBan.m3u8", group: "DỰ PHÒNG (KHÔNG CORS)" }
    ];

    const video = document.getElementById('video');
    const currentTitle = document.getElementById('current-title');
    let hls = new Hls();

    function playStream(channel, element) {
        currentTitle.innerText = channel.name;
        document.querySelectorAll('.channel-item').forEach(el => el.classList.remove('active'));
        element.classList.add('active');

        if (Hls.isSupported()) {
            hls.destroy();
            hls = new Hls();
            hls.loadSource(channel.url);
            hls.attachMedia(video);
            hls.on(Hls.Events.MANIFEST_PARSED, () => video.play());
        } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
            video.src = channel.url;
            video.play();
        }
    }

    function goFullScreen() {
        if (video.requestFullscreen) video.requestFullscreen();
        else if (video.webkitEnterFullscreen) video.webkitEnterFullscreen();
    }

    // Tự động phân nhóm và hiển thị
    const groups = [...new Set(channels.map(c => c.group))];
    const mainList = document.getElementById('main-list');

    groups.forEach(groupName => {
        const header = document.createElement('div');
        header.className = 'group-header';
        header.innerHTML = `<span>${groupName}</span>`;
        mainList.appendChild(header);

        channels.filter(c => c.group === groupName).forEach(channel => {
            const item = document.createElement('div');
            item.className = 'channel-item';
            item.innerHTML = `
                <div class="thumb">IPTV</div>
                <div class="meta">
                    <p class="name">${channel.name}</p>
                    <p class="sub-name">Truyền hình trực tiếp</p>
                </div>
            `;
            item.onclick = () => {
                playStream(channel, item);
                window.scrollTo({top: 0, behavior: 'smooth'});
            };
            mainList.appendChild(item);
        });
    });

    // Play kênh đầu tiên
    window.onload = () => {
        const firstItem = document.querySelector('.channel-item');
        if(firstItem) playStream(channels[0], firstItem);
    };
</script>

</body>
</html>
